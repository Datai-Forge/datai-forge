repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/kynan/nbstripout
    rev: 0.8.1
    hooks:
      - id: nbstripout
        args:
          - "--extra-keys"
          - "metadata.kernelspec metadata.language_info metadata.execution cell.metadata.execution cell.metadata.collapsed cell.metadata.scrolled"
